name: Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium
      - name: Start preview server
        run: |
          npm run preview &
          for i in $(seq 1 60); do
            if curl -fs http://localhost:4321 > /dev/null; then
              echo "Preview ready"
              exit 0
            fi
            sleep 1
          done
          echo "Preview never became ready"
          exit 1
      - name: Run DOM tests
        run: npx playwright test --project=dom
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
